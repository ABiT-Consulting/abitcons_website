<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Authentication</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        line-height: 1.5;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 1.9rem;
      }
      p {
        margin: 0 0 18px;
        font-size: 1.1rem;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #111827;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2 id="title">Social authentication</h2>
    <p id="info"></p>
    <button id="approve" type="button">Approve</button>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const providerRaw = params.get("provider") || "google";
        const intentRaw = params.get("intent") || "signup";
        const provider = providerRaw.toLowerCase();
        const intent = intentRaw.toLowerCase() === "signin" ? "signin" : "signup";
        const providerLabel = provider.charAt(0).toUpperCase() + provider.slice(1);

        document.title = providerLabel + " Login";
        document.getElementById("title").textContent = provider + " authentication";
        document.getElementById("info").textContent =
          "This demo simulates " +
          (intent === "signin" ? "sign-in" : "sign-up") +
          " with " +
          provider +
          ".";
        document.getElementById("approve").textContent =
          intent === "signin" ? "Approve & Sign In" : "Approve & Sign Up";

        document.getElementById("approve").addEventListener("click", function () {
          const payload = {
            provider,
            email: provider + "_user@abitcons.com",
            name: providerLabel + " User",
            intent,
          };
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: "ABIT_SOCIAL_AUTH", payload: payload }, window.location.origin);
          }
          window.close();
        });
      })();
    </script>
  </body>
</html>
